services:
  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webapi
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/webapi.db
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=WebAPI
      - Jwt__Audience=WebAPIUsers
    volumes:
      - webapi-data:/app/data

volumes:
  webapi-data: